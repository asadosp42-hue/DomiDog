<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOMI DOG 🌭</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rojo: #E8192C;
      --amarillo: #FFD700;
      --naranja: #FF6B00;
      --oscuro: #1A0A00;
      --crema: #FFF8EE;
      --cafe: #5C2D0A;
      --sombra: 0 8px 32px rgba(232,25,44,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--oscuro); color: var(--crema); min-height: 100vh; padding-bottom: 100px; }

    /* HEADER */
    header { background: var(--rojo); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-bottom: 4px solid var(--amarillo); }
    .logo-area { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
    .logo-icon { font-size: 2.8rem; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .logo-text { font-family: 'Bangers', cursive; font-size: 2.4rem; letter-spacing: 3px; color: var(--amarillo); text-shadow: 3px 3px 0 var(--oscuro); line-height: 1; }
    .logo-sub { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; color: var(--crema); text-transform: uppercase; opacity: 0.9; }
    .header-nav { display: flex; gap: 12px; align-items: center; }
    /* logo-area clickeable para acceso secreto */
    .logo-area { cursor: pointer; user-select: none; }

    /* HERO */
    .hero { background: linear-gradient(135deg, var(--cafe) 0%, var(--oscuro) 50%, #2d0a00 100%); padding: 60px 2rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: '🌭🍔🌭🍔🌭🍔🌭🍔'; position: absolute; font-size: 2rem; top: 10px; left: 0; right: 0; opacity: 0.08; letter-spacing: 20px; white-space: nowrap; }
    .hero-title { font-family: 'Bangers', cursive; font-size: clamp(3rem, 8vw, 6rem); color: var(--amarillo); text-shadow: 5px 5px 0 var(--rojo), 8px 8px 0 var(--oscuro); letter-spacing: 4px; line-height: 1; margin-bottom: 12px; }
    .hero-sub { font-size: 1.2rem; color: var(--crema); opacity: 0.85; font-weight: 700; margin-bottom: 30px; letter-spacing: 1px; }
    .delivery-badge { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(90deg, var(--naranja), var(--rojo)); padding: 12px 28px; border-radius: 50px; font-weight: 900; font-size: 1rem; letter-spacing: 1px; box-shadow: 0 6px 20px rgba(255,107,0,0.4); animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 6px 20px rgba(255,107,0,0.4)} 50%{box-shadow:0 6px 30px rgba(255,107,0,0.7)} }

    /* MENÚ */
    .menu-section { padding: 50px 2rem; max-width: 1100px; margin: 0 auto; }
    .section-title { font-family: 'Bangers', cursive; font-size: 2.5rem; color: var(--amarillo); letter-spacing: 3px; margin-bottom: 30px; text-align: center; position: relative; }
    .section-title::after { content: ''; display: block; width: 80px; height: 4px; background: var(--rojo); margin: 8px auto 0; border-radius: 2px; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .card { background: linear-gradient(145deg, #2d1000, #1a0800); border: 2px solid #3d1800; border-radius: 20px; overflow: hidden; transition: transform 0.25s, border-color 0.25s; position: relative; }
    .card:hover { transform: translateY(-6px); border-color: var(--amarillo); }
    .card-emoji { font-size: 5rem; text-align: center; padding: 28px 0 10px; display: block; }
    .card-body { padding: 0 20px 20px; }
    .card-name { font-family: 'Bangers', cursive; font-size: 1.5rem; color: var(--crema); letter-spacing: 1px; margin-bottom: 6px; }
    .card-desc { font-size: 0.85rem; color: #c8a07a; margin-bottom: 14px; line-height: 1.5; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .price { font-family: 'Bangers', cursive; font-size: 1.8rem; color: var(--amarillo); letter-spacing: 1px; }
    .price span { font-size: 1rem; color: #c8a07a; }
    .add-btn { background: var(--rojo); color: white; border: none; padding: 10px 18px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    .add-btn:hover { background: var(--naranja); transform: scale(1.08); }
    .popular-badge { position: absolute; top: 14px; right: 14px; background: var(--amarillo); color: var(--oscuro); font-size: 0.7rem; font-weight: 900; padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }

    /* ── CARRITO FLOTANTE SIEMPRE VISIBLE ── */
    .floating-cart {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      background: linear-gradient(90deg, var(--rojo), var(--naranja));
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 60px;
      font-family: 'Bangers', cursive;
      font-size: 1.35rem;
      letter-spacing: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 30px rgba(232,25,44,0.55), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      min-width: 220px;
      justify-content: center;
    }
    .floating-cart:hover { transform: translateX(-50%) scale(1.06); box-shadow: 0 12px 40px rgba(232,25,44,0.7); }
    .floating-cart:active { transform: translateX(-50%) scale(0.97); }
    .floating-cart .fc-icon { font-size: 1.5rem; }
    .floating-cart .fc-badge {
      background: var(--amarillo);
      color: var(--oscuro);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .floating-cart.bump .fc-badge { animation: badgeBump 0.3s ease; }
    @keyframes badgeBump { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }
    .floating-cart .fc-total {
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      opacity: 0.92;
      letter-spacing: 0;
    }
    /* Cuando carrito vacío: más sutil pero siempre visible */
    .floating-cart.empty {
      background: #3d1800;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      opacity: 0.85;
    }
    .floating-cart.empty:hover { opacity: 1; }

    /* MODAL CARRITO */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .overlay.active { display: flex; }
    .modal { background: var(--oscuro); border: 3px solid var(--rojo); border-radius: 24px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 30px; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
    .modal-title { font-family: 'Bangers', cursive; font-size: 2rem; color: var(--amarillo); letter-spacing: 2px; margin-bottom: 20px; }
    .close-btn { position: absolute; top: 16px; right: 16px; background: var(--rojo); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; }
    .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #3d1800; gap: 10px; }
    .cart-item-name { font-weight: 700; color: var(--crema); font-size: 0.95rem; }
    .cart-item-price { color: var(--amarillo); font-weight: 700; font-size: 0.85rem; }
    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn { background: #3d1800; color: var(--crema); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; transition: background 0.2s; }
    .qty-btn:hover { background: var(--rojo); }
    .qty-num { font-weight: 900; color: var(--amarillo); min-width: 20px; text-align: center; }
    .cart-empty { text-align: center; padding: 30px 0; color: #c8a07a; font-size: 1.1rem; }
    .delivery-notice { background: linear-gradient(90deg,rgba(255,107,0,0.2),rgba(232,25,44,0.2)); border: 1px solid var(--naranja); border-radius: 12px; padding: 14px 16px; margin: 16px 0; font-size: 0.9rem; color: #ffcf9e; font-weight: 700; }
    .cart-total { font-family: 'Bangers', cursive; font-size: 1.8rem; color: var(--amarillo); text-align: right; margin: 16px 0; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-weight: 700; color: var(--crema); font-size: 0.85rem; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; background: #2d1000; border: 2px solid #3d1800; border-radius: 12px; color: var(--crema); font-family: 'Nunito', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--amarillo); }
    .form-input::placeholder { color: #7a4a2a; }
    /* WhatsApp field highlight */
    .form-input.whatsapp-input { border-color: #25D366; }
    .form-input.whatsapp-input:focus { border-color: #1ebe5d; box-shadow: 0 0 0 3px rgba(37,211,102,0.15); }
    .whatsapp-label { color: #25D366 !important; }
    .whatsapp-badge { background: #25D366; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; font-weight: 900; letter-spacing: 0.5px; }
    .order-btn { width: 100%; background: linear-gradient(90deg, var(--rojo), var(--naranja)); color: white; border: none; padding: 16px; border-radius: 50px; font-family: 'Bangers', cursive; font-size: 1.5rem; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .order-btn:hover { transform: scale(1.03); }
    .order-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* PANEL DUEÑO */
    .admin-panel { display: none; position: fixed; inset: 0; background: #0d0500; z-index: 300; overflow-y: auto; }
    .admin-panel.active { display: block; }
    .admin-header { background: var(--cafe); padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--amarillo); position: sticky; top: 0; z-index: 10; }
    .admin-title { font-family: 'Bangers', cursive; font-size: 2rem; color: var(--amarillo); letter-spacing: 2px; }
    .admin-close { background: var(--rojo); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; }
    .admin-content { padding: 30px; max-width: 900px; margin: 0 auto; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 36px; }
    .stat-card { background: #2d1000; border: 2px solid #3d1800; border-radius: 16px; padding: 20px; text-align: center; }
    .stat-value { font-family: 'Bangers', cursive; font-size: 2.2rem; color: var(--amarillo); }
    .stat-label { font-size: 0.78rem; color: #c8a07a; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 22px; border-radius: 30px; border: 2px solid #3d1800; background: transparent; color: #c8a07a; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--rojo); border-color: var(--rojo); color: white; }
    .tab-btn:hover:not(.active) { border-color: var(--amarillo); color: var(--amarillo); }
    .orders-list { display: flex; flex-direction: column; gap: 16px; }
    .order-card { background: #2d1000; border: 2px solid #3d1800; border-radius: 16px; padding: 20px; }
    .order-card.pending { border-left: 5px solid var(--amarillo); }
    .order-card.preparing { border-left: 5px solid var(--naranja); }
    .order-card.delivered { border-left: 5px solid #28a745; }
    .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .order-num { font-family: 'Bangers', cursive; font-size: 1.3rem; color: var(--amarillo); }
    .order-time { font-size: 0.78rem; color: #c8a07a; }
    .order-status-badge { padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
    .status-pending { background: rgba(255,215,0,0.15); color: var(--amarillo); border: 1px solid var(--amarillo); }
    .status-preparing { background: rgba(255,107,0,0.15); color: var(--naranja); border: 1px solid var(--naranja); }
    .status-delivered { background: rgba(40,167,69,0.15); color: #28a745; border: 1px solid #28a745; }
    .order-client { font-weight: 700; color: var(--crema); margin-bottom: 4px; }
    .order-address { font-size: 0.85rem; color: #c8a07a; margin-bottom: 10px; }
    /* WhatsApp link en pedidos admin */
    .order-wa { font-size: 0.85rem; color: #25D366; margin-bottom: 4px; font-weight: 700; }
    .order-wa a { color: #25D366; text-decoration: none; }
    .order-wa a:hover { text-decoration: underline; }
    .order-items-list { background: #1a0800; border-radius: 10px; padding: 12px; margin-bottom: 12px; font-size: 0.88rem; color: #e8c99a; line-height: 1.8; }
    .order-total-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .order-total-val { font-family: 'Bangers', cursive; font-size: 1.4rem; color: var(--amarillo); }
    .order-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn { padding: 7px 16px; border-radius: 20px; border: none; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .btn-prepare { background: var(--naranja); color: white; }
    .btn-deliver { background: #28a745; color: white; }
    .no-orders { text-align: center; padding: 60px 0; color: #7a4a2a; font-size: 1.1rem; }
    .history-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #2d1000; border-radius: 10px; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; border-left: 3px solid #28a745; }
    .history-info { font-size: 0.85rem; color: #c8a07a; }
    .history-name { font-weight: 700; color: var(--crema); font-size: 0.95rem; }
    .history-total { font-family: 'Bangers', cursive; color: #28a745; font-size: 1.2rem; }
    .loading { text-align: center; padding: 40px; color: #c8a07a; font-size: 1rem; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #3d1800; border-top-color: var(--amarillo); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .new-order-notif { position: fixed; bottom: 90px; right: 24px; background: var(--rojo); color: white; padding: 16px 24px; border-radius: 16px; font-weight: 900; font-size: 1rem; z-index: 400; box-shadow: 0 8px 30px rgba(0,0,0,0.5); animation: slideIn 0.4s ease; display: none; }
    @keyframes slideIn { from{transform:translateY(80px);opacity:0} to{transform:translateY(0);opacity:1} }
    .success-screen { text-align: center; padding: 30px 0; }
    .success-emoji { font-size: 5rem; margin-bottom: 16px; display: block; animation: pop 0.4s ease; }
    @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
    .success-title { font-family: 'Bangers', cursive; font-size: 2.2rem; color: var(--amarillo); letter-spacing: 2px; margin-bottom: 10px; }
    .success-msg { color: #c8a07a; font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; }

    footer { background: var(--cafe); text-align: center; padding: 24px; border-top: 3px solid var(--rojo); color: #c8a07a; font-size: 0.85rem; font-weight: 700; }
    footer span { color: var(--amarillo); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a0800; }
    ::-webkit-scrollbar-thumb { background: var(--rojo); border-radius: 3px; }

    @media (max-width: 600px) {
      header { padding: 0 14px; }
      .logo-text { font-size: 1.8rem; }
      .logo-icon { font-size: 2rem; }
      .menu-section { padding: 30px 14px; }
      .floating-cart { bottom: 16px; padding: 14px 22px; font-size: 1.1rem; min-width: 180px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area" id="logoArea">
    <span class="logo-icon">🌭</span>
    <div>
      <div class="logo-text">DOMI DOG</div>
      <div class="logo-sub">Perros & Hamburguesas</div>
    </div>
  </div>
</header>

<section class="hero">
  <h1 class="hero-title">¡DOMI DOG!</h1>
  <p class="hero-sub">Los mejores perros calientes y hamburguesas 🔥</p>
  <div class="delivery-badge">🛵 Domicilio disponible · $4.000 – $5.000</div>
</section>

<section class="menu-section">
  <h2 class="section-title">🌭 Nuestro Menú</h2>
  <div class="menu-grid" id="menuGrid"></div>
</section>

<footer>
  <p>© 2025 <span>DOMI DOG</span> · Pedidos a domicilio · Hecho con ❤️ y mucha mostaza</p>
</footer>

<!-- CARRITO FLOTANTE SIEMPRE VISIBLE -->
<button class="floating-cart empty" id="floatingCart" onclick="openCart()">
  <span class="fc-icon">🛒</span>
  <span id="fcLabel">Mi Pedido</span>
  <span class="fc-badge" id="fcCount">0</span>
</button>

<!-- MODAL CARRITO -->
<div class="overlay" id="cartOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeCart()">✕</button>
    <div id="cartContent"></div>
  </div>
</div>

<!-- PANEL DUEÑO -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <div class="admin-title">🔑 Panel del Dueño</div>
    <button class="admin-close" onclick="closeAdmin()">✕ Cerrar</button>
  </div>
  <div class="admin-content" id="adminContent">
    <div class="loading"><div class="spinner"></div><br>Cargando...</div>
  </div>
</div>

<!-- NOTIFICACIÓN NUEVO PEDIDO -->
<div class="new-order-notif" id="newOrderNotif">🔔 ¡Nuevo pedido recibido!</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCPSF58C1Trhv7HCVLxDrKM0RdWy7dSZ5c",
  authDomain: "domidog.firebaseapp.com",
  databaseURL: "https://domidog-default-rtdb.firebaseio.com",
  projectId: "domidog",
  storageBucket: "domidog.firebasestorage.app",
  messagingSenderId: "944281255622",
  appId: "1:944281255622:web:9457d2fa04fadea7cfe1c7",
  measurementId: "G-XRD4R4RCJV"
};

let db, ordersRef;
const app = initializeApp(FIREBASE_CONFIG);
db = getDatabase(app);
ordersRef = ref(db, 'orders');

// ── MENÚ ──
const menu = [
  { id:1, name:"Perro Sencillo",      desc:"Salchicha jumbo, pan suave, salsas a tu gusto",                          price:4000,  emoji:"🌭", popular:false },
  { id:2, name:"Perro + Tocineta",    desc:"Salchicha jumbo con tocineta crujiente, pan tostado y salsas",            price:6000,  emoji:"🌭", popular:true  },
  { id:3, name:"Perro Apanado",       desc:"Salchicha apanada crocante, pan suave, salsas especiales",                price:4500,  emoji:"🌭", popular:false },
  { id:4, name:"Hamburguesa Sencilla",desc:"Carne jugosa, lechuga, tomate, queso y salsas de la casa",               price:6000,  emoji:"🍔", popular:false },
  { id:5, name:"Hamburguesa Doble",   desc:"Doble carne, doble queso, tocineta, lechuga, tomate y salsas",           price:12000, emoji:"🍔", popular:true  }
];

let cart = [];
let knownOrderKeys = new Set();
let adminOpen = false;
let currentTab = 'activos';

// ── RENDER MENÚ ──
function renderMenu() {
  document.getElementById('menuGrid').innerHTML = menu.map(item => `
    <div class="card">
      ${item.popular ? '<span class="popular-badge">⭐ Popular</span>' : ''}
      <span class="card-emoji">${item.emoji}</span>
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-footer">
          <div class="price">$${item.price.toLocaleString('es-CO')} <span>COP</span></div>
          <button class="add-btn" onclick="addToCart(${item.id}, this)">+ Agregar</button>
        </div>
      </div>
    </div>`).join('');
}

// ── CARRITO ──
window.addToCart = function(id, btn) {
  const item = menu.find(m => m.id === id);
  const ex = cart.find(c => c.id === id);
  ex ? ex.qty++ : cart.push({...item, qty:1});
  updateCartUI();
  btn.style.transform = 'scale(0.88)';
  setTimeout(() => btn.style.transform = '', 150);
  // Efecto bump en el badge flotante
  const fc = document.getElementById('floatingCart');
  fc.classList.remove('bump');
  void fc.offsetWidth;
  fc.classList.add('bump');
  setTimeout(() => fc.classList.remove('bump'), 400);
};

function totalItems() { return cart.reduce((s,c) => s+c.qty, 0); }
function subtotal() { return cart.reduce((s,c) => s + c.price * c.qty, 0); }

function updateCartUI() {
  const count = totalItems();
  const sub = subtotal();
  const fc = document.getElementById('floatingCart');
  const fcCount = document.getElementById('fcCount');
  const fcLabel = document.getElementById('fcLabel');

  fcCount.textContent = count;

  if (count === 0) {
    fc.classList.add('empty');
    fcLabel.textContent = 'Mi Pedido';
  } else {
    fc.classList.remove('empty');
    fcLabel.textContent = `$${sub.toLocaleString('es-CO')}`;
  }
}

window.openCart = function() { renderCart(); document.getElementById('cartOverlay').classList.add('active'); };
window.closeCart = function() { document.getElementById('cartOverlay').classList.remove('active'); };

function renderCart(success=false) {
  const el = document.getElementById('cartContent');
  if (success) {
    el.innerHTML = `<div class="success-screen">
      <span class="success-emoji">🎉</span>
      <div class="success-title">¡PEDIDO ENVIADO!</div>
      <p class="success-msg">Tu pedido fue recibido con éxito.<br>Pronto estamos preparando todo para ti 🌭🍔<br><br>
      <strong style="color:var(--amarillo)">Recuerda: domicilio adicional $4.000 – $5.000 según tu zona.</strong></p>
      <button class="order-btn" onclick="closeCart()">¡Listo! 🙌</button>
    </div>`;
    return;
  }
  if (cart.length === 0) {
    el.innerHTML = `<div class="modal-title">🛒 Mi Pedido</div>
      <div class="cart-empty"><div style="font-size:3rem;margin-bottom:12px">🌭</div>Tu carrito está vacío.<br>¡Agrega algo delicioso!</div>`;
    return;
  }
  el.innerHTML = `<div class="modal-title">🛒 Mi Pedido</div>
    ${cart.map(item => `<div class="cart-item">
      <div><div class="cart-item-name">${item.emoji} ${item.name}</div>
      <div class="cart-item-price">$${(item.price*item.qty).toLocaleString('es-CO')} COP</div></div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div></div>`).join('')}
    <div class="delivery-notice">🛵 El domicilio tiene un costo adicional de <strong>$4.000 a $5.000</strong> según tu zona.</div>
    <div class="cart-total">Subtotal: $${subtotal().toLocaleString('es-CO')} COP</div>
    <div>
      <div class="form-group">
        <label class="form-label">👤 Tu nombre *</label>
        <input class="form-input" id="clientName" placeholder="Ej: María García"/>
      </div>
      <div class="form-group">
        <label class="form-label">📞 Teléfono *</label>
        <input class="form-input" id="clientPhone" placeholder="Ej: 310 000 0000" type="tel"/>
      </div>
      <div class="form-group">
        <label class="form-label whatsapp-label">
          <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"/>
          WhatsApp * <span class="whatsapp-badge">Obligatorio</span>
        </label>
        <input class="form-input whatsapp-input" id="clientWhatsapp" placeholder="Ej: 310 000 0000 (con código de país si aplica)" type="tel"/>
        <div style="font-size:0.75rem;color:#25D366;margin-top:4px;font-weight:700;">📲 Te avisaremos por WhatsApp cuando tu pedido esté listo</div>
      </div>
      <div class="form-group">
        <label class="form-label">📍 Dirección de entrega *</label>
        <input class="form-input" id="clientAddress" placeholder="Ej: Cra 5 #12-34, Barrio Centro"/>
      </div>
      <div class="form-group">
        <label class="form-label">💬 Notas (opcional)</label>
        <input class="form-input" id="clientNotes" placeholder="Ej: sin cebolla, extra salsa..."/>
      </div>
      <button class="order-btn" id="submitBtn" onclick="submitOrder()">🌭 ENVIAR PEDIDO</button>
    </div>`;
}

window.changeQty = function(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
  updateCartUI();
  renderCart();
};

window.submitOrder = async function() {
  const name     = document.getElementById('clientName').value.trim();
  const phone    = document.getElementById('clientPhone').value.trim();
  const whatsapp = document.getElementById('clientWhatsapp').value.trim();
  const address  = document.getElementById('clientAddress').value.trim();
  const notes    = document.getElementById('clientNotes').value.trim();

  if (!name || !phone || !whatsapp || !address) {
    if (!whatsapp) {
      document.getElementById('clientWhatsapp').style.borderColor = '#e8192c';
      document.getElementById('clientWhatsapp').focus();
    }
    alert('⚠️ Completa todos los campos obligatorios:\nNombre, Teléfono, WhatsApp y Dirección.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const order = {
    time: new Date().toLocaleString('es-CO'),
    timestamp: Date.now(),
    client: name,
    phone,
    whatsapp,
    address,
    notes,
    items: cart.map(c => ({ name:c.name, qty:c.qty, price:c.price })),
    total: subtotal(),
    status: 'pending'
  };

  await push(ordersRef, order);

  cart = [];
  updateCartUI();
  renderCart(true);
};

// ── ADMIN ──
window.openAdmin = function() {
  const pass = prompt('🔑 Contraseña del dueño:');
  if (pass !== 'domidog123') { alert('❌ Contraseña incorrecta'); return; }
  adminOpen = true;
  document.getElementById('adminPanel').classList.add('active');
  loadAdmin();
};

window.closeAdmin = function() {
  adminOpen = false;
  document.getElementById('adminPanel').classList.remove('active');
};

function loadAdmin() {
  onValue(ordersRef, snap => {
    const raw = snap.val() || {};
    const all = Object.entries(raw).map(([key, val]) => ({...val, key}))
                  .sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    all.forEach(o => {
      if (!knownOrderKeys.has(o.key)) {
        if (knownOrderKeys.size > 0) showNotif();
        knownOrderKeys.add(o.key);
      }
    });
    if (adminOpen) renderAdmin(all);
  });
}

function renderAdmin(all) {
  const activos   = all.filter(o => o.status !== 'delivered');
  const historial = all.filter(o => o.status === 'delivered');
  const revenue   = all.reduce((s,o) => s+o.total, 0);
  const pending   = all.filter(o => o.status === 'pending').length;
  const preparing = all.filter(o => o.status === 'preparing').length;

  document.getElementById('adminContent').innerHTML = buildAdminHTML(activos, historial, all.length, pending, preparing, revenue);
}

function buildAdminHTML(activos, historial, total, pending, preparing, revenue) {
  const statusLabel = { pending:'⏳ Pendiente', preparing:'🔥 Preparando', delivered:'✅ Entregado' };
  const statusClass = { pending:'status-pending', preparing:'status-preparing', delivered:'status-delivered' };
  const cardClass   = { pending:'pending', preparing:'preparing', delivered:'delivered' };

  function waLink(number) {
    const clean = number.replace(/\D/g,'');
    return `<a href="https://wa.me/${clean}" target="_blank">📲 ${number}</a>`;
  }

  const activosHTML = activos.length === 0
    ? '<div class="no-orders">🌭 No hay pedidos activos ahora mismo.</div>'
    : activos.map(o => `
      <div class="order-card ${cardClass[o.status]}" id="oc-${o.key}">
        <div class="order-top">
          <div><div class="order-num">Pedido · ${new Date(o.timestamp||Date.now()).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="order-time">🕐 ${o.time}</div></div>
          <span class="order-status-badge ${statusClass[o.status]}">${statusLabel[o.status]}</span>
        </div>
        <div class="order-client">👤 ${o.client} · 📞 ${o.phone}</div>
        ${o.whatsapp ? `<div class="order-wa">💬 WhatsApp: ${waLink(o.whatsapp)}</div>` : ''}
        <div class="order-address">📍 ${o.address}</div>
        ${o.notes ? `<div class="order-address">💬 ${o.notes}</div>` : ''}
        <div class="order-items-list">
          ${o.items.map(i => `• ${i.qty}x ${i.name} — $${(i.price*i.qty).toLocaleString('es-CO')}`).join('<br>')}
          <br><strong style="color:var(--naranja)">+ Domicilio: $4.000 – $5.000</strong>
        </div>
        <div class="order-total-row">
          <div class="order-total-val">Total: $${o.total.toLocaleString('es-CO')} COP</div>
          <div class="order-actions">
            ${o.status==='pending'   ? `<button class="action-btn btn-prepare" onclick="setStatus('${o.key}','preparing')">🔥 Preparando</button>` : ''}
            ${o.status==='preparing' ? `<button class="action-btn btn-deliver" onclick="setStatus('${o.key}','delivered')">✅ Entregado</button>` : ''}
          </div>
        </div>
      </div>`).join('');

  const historialHTML = historial.length === 0
    ? '<div class="no-orders" style="padding:30px 0">📭 Aún no hay ventas completadas.</div>'
    : historial.map(o => `
      <div class="history-row">
        <div>
          <div class="history-name">👤 ${o.client} · 📞 ${o.phone}${o.whatsapp ? ` · 💬 ${o.whatsapp}` : ''}</div>
          <div class="history-info">📍 ${o.address} · 🕐 ${o.time}</div>
          <div class="history-info">${o.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}</div>
        </div>
        <div class="history-total">$${o.total.toLocaleString('es-CO')}</div>
      </div>`).join('');

  return `
    <div class="admin-stats">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Pedidos</div></div>
      <div class="stat-card"><div class="stat-value">${pending}</div><div class="stat-label">Pendientes</div></div>
      <div class="stat-card"><div class="stat-value">${preparing}</div><div class="stat-label">Preparando</div></div>
      <div class="stat-card"><div class="stat-value" style="font-size:1.2rem">$${revenue.toLocaleString('es-CO')}</div><div class="stat-label">Ventas Totales</div></div>
    </div>
    <div class="admin-tabs">
      <button class="tab-btn ${currentTab==='activos'?'active':''}" onclick="switchTab('activos')">🔥 Pedidos Activos (${activos.length})</button>
      <button class="tab-btn ${currentTab==='historial'?'active':''}" onclick="switchTab('historial')">📊 Historial de Ventas (${historial.length})</button>
    </div>
    <div id="tabActivos" class="orders-list" style="${currentTab==='activos'?'':'display:none'}">${activosHTML}</div>
    <div id="tabHistorial" style="${currentTab==='historial'?'':'display:none'}">${historialHTML}</div>`;
}

window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tabActivos').style.display   = tab==='activos'   ? '' : 'none';
  document.getElementById('tabHistorial').style.display = tab==='historial' ? '' : 'none';
};

window.setStatus = async function(key, status) {
  await update(ref(db, 'orders/' + key), { status });
};

function showNotif() {
  const n = document.getElementById('newOrderNotif');
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 4000);
}

// ── ACCESO SECRETO: TRIPLE CLIC EN EL LOGO ──
(function() {
  let clickCount = 0;
  let clickTimer = null;
  document.getElementById('logoArea').addEventListener('click', function() {
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { clickCount = 0; }, 600);
    if (clickCount >= 3) {
      clickCount = 0;
      clearTimeout(clickTimer);
      openAdmin();
    }
  });
})();

renderMenu();
</script>
